 waters of Taylor Bay, this expansive villa has it all.\u003cbr />\u003cbr />After your booking is confirmed, you’ll be personally connected within 24 hours to one of our Elite Destination Homes reservation specialists. Supported by over 20 years of experience and premier status, they will curate every detail, guiding you","readMoreButton":null,"textStyle":null,"recommendedNumberOfLines":null,"minimumNumberOfLinesForTruncation":null},"image":null,"kicker":null,"loggingEventData":null,"media":null,"subtitle":null,"subtitleStyle":null,"title":null,"titleStyle":null},{"__typename":"BasicListItem","action":null,"anchor":null,"accessibilityLabel":null,"button":null,"icon":null,"html":{"__typename":"Html","htmlText":"Highlights:\u003cbr />• Spacious indoor and outdoor living spaces, including a large screened lanai\u003cbr />• All bedrooms open onto a patio or balcony with amazing ocean views\u003cbr />• Large pool with separate spillover hot tub\u003cbr />• Poolside gazebo\u003cbr />• Outdoor kitchen area with built in gas BBQ and sink\u003cbr />• Oceanside gas fire pit\u003cbr />• Private swimming and sunbathing platform with easy ocean access\u003cbr />• New hard body stand-up paddleboards and snorkeling gear for you to use at your leisure\u003cbr />• $200/week air conditioning allowance included\u003cbr />\u003cbr />Perfect for families or groups, Villa La Percha offers a one-of-a-kind escape. From the mesmerizing views from each bedroom, to the spectacular patio and pool deck, to kayaking in the pristine waters of Taylor Bay, this expansive villa has it all. Nestled in a quiet neighborhood, this palatial estate features every modern luxury you could want.\u003cbr />\u003cbr />A simply stunning property, the interior of Villa La Percha is open, airy, and spacious. A spectacular gourmet kitchen opens to multiple living and dining spaces. Four incredible bedrooms each feature an en suite bathroom and either a private balcony or access to the patio, providing the ultimat uxury you could want.\u003cbr />\u003cbr />A simply stunning property, the interior of Villa La Percha is open, airy, and spacious. A spectacular gourmet kitchen opens to multiple living and dining spaces. Four incredible bedrooms each feature an en suite bathroom and either a private balcony or access to the patio, providing the ultimate views and unparalleled comfort.\u003cbr />\u003cbr />The patio is the jewel of the home featuring a beautiful, unique pool and hot tub, expansive lounging space, a large fire pit, multiple sheltered areas, and a built-in grill. Enjoy a relaxing swim, sunbathe in comfort and privacy, or simply enjoy the amazing views.\u003cbr />\u003cbr />Take a few steps down to your own personal swimming platform! With kayaks and paddleboards, you can cruise the warm clear waters – or you can simply jump in. This is also the perfect vantage point for the gorgeous sunsets over the water. Take a short stroll to Taylor Bay Beach with white sand and shallow waters, ideal for children or simply relaxing.\u003cbr />\u003cbr />Villa La Percha is truly an escape from the ordinary. Enjoy the Caribbean like never before at this one-of-a-kind luxury vacation home.\u003cbr />\u003cbr />Mid-stay cleaning is included with 7-night stay or longer. Shorter stays can schedule cleaning for an additional fee.\u003cbr />\u003cbr />\u003cb>Other things to note\u003c/b>\u003cbr />A signed rental agreement is required to confirm and honor your reservation. A personal email address is necessary to complete this process and collect the required information.\u003cbr />\u003cbr />By booking this property, you acknowledge that you have reviewed the listing in its entirety and agree to all property rules, regulations, and policies.\u003cbr />\u003cbr />Additional booking details:\u003cbr />- Guest verification will be completed through our third-party partner, Truvi\u003cbr />- A dedicated local concierge will reach out 45–60 days prior to your arrival to assist with planning
